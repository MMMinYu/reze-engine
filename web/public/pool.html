<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Pool Shader (WebGPU)</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="gpuCanvas"></canvas>

    <script type="module">
      class Vec3 {
        constructor(x, y, z) {
          this.x = x
          this.y = y
          this.z = z
        }
        add(other) {
          return new Vec3(this.x + other.x, this.y + other.y, this.z + other.z)
        }
        subtract(other) {
          return new Vec3(this.x - other.x, this.y - other.y, this.z - other.z)
        }
        normalize() {
          const len = Math.sqrt(this.x * this.x + this.y * this.y + this.z * this.z)
          return len === 0 ? new Vec3(0, 0, 0) : new Vec3(this.x / len, this.y / len, this.z / len)
        }
        cross(other) {
          return new Vec3(
            this.y * other.z - this.z * other.y,
            this.z * other.x - this.x * other.z,
            this.x * other.y - this.y * other.x
          )
        }
        dot(other) {
          return this.x * other.x + this.y * other.y + this.z * other.z
        }
        scale(scalar) {
          return new Vec3(this.x * scalar, this.y * scalar, this.z * scalar)
        }
      }

      class Mat4 {
        static lookAt(eye, target, up) {
          const forward = target.subtract(eye).normalize()
          const right = up.cross(forward).normalize()
          const upVec = forward.cross(right).normalize()
          return new Float32Array([
            right.x,
            upVec.x,
            forward.x,
            0,
            right.y,
            upVec.y,
            forward.y,
            0,
            right.z,
            upVec.z,
            forward.z,
            0,
            -right.dot(eye),
            -upVec.dot(eye),
            -forward.dot(eye),
            1,
          ])
        }
      }

      class Camera {
        constructor(alpha, beta, radius, target) {
          this.alpha = alpha
          this.beta = beta
          this.radius = radius
          this.target = target
          this.isDragging = false
          this.mouseButton = null
          this.lastMousePos = { x: 0, y: 0 }
        }
        getPosition() {
          const x = this.target.x + this.radius * Math.sin(this.beta) * Math.sin(this.alpha)
          const y = this.target.y + this.radius * Math.cos(this.beta)
          const z = this.target.z + this.radius * Math.sin(this.beta) * Math.cos(this.alpha)
          return new Vec3(x, y, z)
        }
        attachControl(canvas) {
          canvas.addEventListener("mousedown", (e) => {
            this.isDragging = true
            this.mouseButton = e.button
            this.lastMousePos = { x: e.clientX, y: e.clientY }
          })
          window.addEventListener("mousemove", (e) => {
            if (!this.isDragging) return
            const dx = e.clientX - this.lastMousePos.x
            const dy = e.clientY - this.lastMousePos.y
            if (this.mouseButton === 2) {
              const panDist = this.radius * 0.0002
              this.target = this.target.add(new Vec3(1, 0, 0).scale(-dx * panDist))
              this.target = this.target.add(new Vec3(0, 1, 0).scale(dy * panDist))
            } else {
              this.alpha += dx * 0.005
              this.beta = Math.max(0.001, Math.min(Math.PI - 0.001, this.beta - dy * 0.005))
            }
            this.lastMousePos = { x: e.clientX, y: e.clientY }
          })
          window.addEventListener("mouseup", () => {
            this.isDragging = false
            this.mouseButton = null
          })
          canvas.addEventListener("wheel", (e) => {
            e.preventDefault()
            this.radius = Math.max(0.1, Math.min(1000, this.radius + e.deltaY * 0.01))
          })
          canvas.addEventListener("contextmenu", (e) => e.preventDefault())
        }
      }

      const config = {
        cloudSharpness: 0.001,
        windSpeed: [-23.0, 12.0],
        bumpFactor: 0.05,
        bumpDistance: 5000,
        skyColor: [0.1, 0.1, 0.15],
        moonlightColor: [0.4, 0.4, 0.2],
        skyByMoonlightColor: [0.4, 0.2, 0.87],
        bottleColor: [0.7, 1.0, 0.6],
        waterColor: [0.2, 0.2, 0.4],
        exposure: 0.9,
        epsilon: 0.01,
        noiseTextureSize: 256,
        horizonFadeStart: 30.0,
        horizonFadeEnd: 100.0,
        horizonBlurAmount: 0.3,
        moonPosition: [-0, 0.12, 0.5],
        moonSize: 0.04,
      }

      const computeShaderCode = `
        @group(0) @binding(0) var noiseTexture: texture_storage_2d<r32float, write>;
        
        fn hash2(p: vec2<f32>) -> f32 {
          let p3 = fract(vec3<f32>(p.xyx) * vec3<f32>(0.1031, 0.1030, 0.0973));
          let dot = dot(p3, vec3<f32>(p3.yzx + 33.33));
          return fract((p3.x + p3.y) * dot);
        }
        
        @compute @workgroup_size(8, 8)
        fn main(@builtin(global_invocation_id) globalId: vec3<u32>) {
          let uv = vec2<f32>(globalId.xy) / 256.0;
          var noise: f32 = 0.0;
          var amplitude: f32 = 1.0;
          var p = uv * 8.0;
          for (var i: i32 = 0; i < 4; i++) {
            noise += amplitude * hash2(p);
            amplitude *= 0.5;
            p = p * 2.0;
          }
          textureStore(noiseTexture, vec2<i32>(globalId.xy), vec4<f32>(noise / 1.875, 0.0, 0.0, 1.0));
        }
      `

      const shaderCode = `
        struct Uniforms {
          time: f32,
          _padding1: f32,
          resolution: vec2<f32>,
          cameraPos: vec3<f32>,
          cameraTarget: vec3<f32>,
        };

        @group(0) @binding(0) var<uniform> uniforms: Uniforms;

        struct VertexOutput {
          @builtin(position) Position: vec4<f32>,
          @location(0) uv: vec2<f32>,
        };

        @vertex
        fn vs_main(@builtin(vertex_index) VertexIndex: u32) -> VertexOutput {
          var pos = array<vec2<f32>, 6>(
            vec2<f32>(-1.0, -1.0), vec2<f32>(1.0, -1.0), vec2<f32>(-1.0, 1.0),
            vec2<f32>(-1.0, 1.0), vec2<f32>(1.0, -1.0), vec2<f32>(1.0, 1.0)
          );
          var output: VertexOutput;
          output.Position = vec4<f32>(pos[VertexIndex], 0.0, 1.0);
          var uv = pos[VertexIndex] * 0.5 + 0.5;
          output.uv = vec2<f32>(uv.x, 1.0 - uv.y);
          return output;
        }

        const CLOUDSHARPNESS: f32 = ${config.cloudSharpness};
        const WINDSPEED: vec2<f32> = vec2<f32>(${config.windSpeed.join(",")});
        const BUMPFACTOR: f32 = ${config.bumpFactor};
        const BUMPDISTANCE: f32 = ${config.bumpDistance};
        const SKYCOLOR: vec3<f32> = vec3<f32>(${config.skyColor.join(",")});
        const MOONLIGHTCOLOR: vec3<f32> = vec3<f32>(${config.moonlightColor.join(",")});
        const SKYBYMOONLIGHTCOLOR: vec3<f32> = vec3<f32>(${config.skyByMoonlightColor.join(",")});
        const BOTTLECOLOR: vec3<f32> = vec3<f32>(${config.bottleColor.join(",")}) * 0.3;
        const WATERCOLOR: vec3<f32> = vec3<f32>(${config.waterColor.join(",")});
        const EXPOSURE: f32 = ${config.exposure};
        const EPSILON: f32 = ${config.epsilon};
        const HORIZONFADESTART: f32 = ${config.horizonFadeStart};
        const HORIZONFADEEND: f32 = ${config.horizonFadeEnd};
        const HORIZONBLURAMOUNT: f32 = ${config.horizonBlurAmount};
        const MOONPOSITION: vec3<f32> = vec3<f32>(${config.moonPosition.join(",")});
        const MOONSIZE: f32 = ${config.moonSize};

        const m: mat3x3<f32> = mat3x3<f32>(
          vec3<f32>(0.00, -0.90, -0.60),
          vec3<f32>(0.90, 0.36, -0.48),
          vec3<f32>(-0.60, -0.48, 0.34)
        );

        const mr: mat2x2<f32> = mat2x2<f32>(
          0.84147, 0.54030,
          0.54030, -0.84147
        );

        fn hash(n: f32) -> f32 {
          return fract(sin(n) * 43758.5453);
        }

        fn hash3(p: vec3<f32>) -> f32 {
          var p3 = fract(p * 0.1031);
          p3 += dot(p3, p3.yzx + 33.33);
          return fract((p3.x + p3.y) * p3.z);
        }

        fn noise3(x: vec3<f32>) -> f32 {
          let p = floor(x);
          var f = fract(x);
          f = f * f * (3.0 - 2.0 * f);
          return mix(
            mix(mix(hash3(p), hash3(p + vec3<f32>(1.0, 0.0, 0.0)), f.x),
                mix(hash3(p + vec3<f32>(0.0, 1.0, 0.0)), hash3(p + vec3<f32>(1.0, 1.0, 0.0)), f.x), f.y),
            mix(mix(hash3(p + vec3<f32>(0.0, 0.0, 1.0)), hash3(p + vec3<f32>(1.0, 0.0, 1.0)), f.x),
                mix(hash3(p + vec3<f32>(0.0, 1.0, 1.0)), hash3(p + vec3<f32>(1.0, 1.0, 1.0)), f.x), f.y), f.z
          );
        }

        fn noise2(x: vec2<f32>) -> f32 {
          let p = floor(x);
          var f = fract(x);
          f = f * f * (3.0 - 2.0 * f);
          let n = p.x + p.y * 57.0;
          return mix(
            mix(hash(f32(n)), hash(f32(n + 1.0)), f.x),
            mix(hash(f32(n + 57.0)), hash(f32(n + 58.0)), f.x),
            f.y
          );
        }

        fn fbm3(p: vec3<f32>) -> f32 {
          var f: f32 = 0.0;
          var p_var = p;
          var weight: f32 = 0.5;
          f = weight * noise3(p_var);
          p_var = m * p_var * 2.02;
          weight *= 0.5;
          f += weight * noise3(p_var);
          p_var = m * p_var * 2.33;
          weight *= 0.5;
          f += weight * noise3(p_var);
          p_var = m * p_var * 2.01;
          weight *= 0.5;
          f += weight * noise3(p_var);
          return f / 0.9375;
        }

        fn fbm2(p: vec2<f32>) -> f32 {
          var f: f32 = 0.0;
          var p_var = p;
          var weight: f32 = 0.5;
          f = weight * noise2(p_var);
          p_var = mr * p_var * 2.02;
          weight *= 0.5;
          f += weight * noise2(p_var);
          p_var = mr * p_var * 2.33;
          weight *= 0.5;
          f += weight * noise2(p_var);
          p_var = mr * p_var * 2.01;
          weight *= 0.5;
          f += weight * noise2(p_var);
          return f / 0.9375;
        }

        fn waterHeightMap(pos: vec2<f32>, time: f32) -> f32 {
          var posm = mr * pos;
          posm.x += 0.25 * time;
          let f = noise2(posm * 1.9) * 0.5 + noise2(posm * 3.8) * 0.25;
          var height = 0.5 + 0.1 * f;
          height += 0.13 * sin(posm.x * 6.0 + 10.0 * f);
          let d = length(pos - vec2<f32>(-3.0, 0.0));
          height += 0.1 * cos(d * 50.0 - time * 4.0) * (1.0 - smoothstep(0.0, 1.0, d));
          return height;
        }

        struct IntersectResult {
          hit: bool,
          dist: f32,
        }

        fn intersectPlane(ro: vec3<f32>, rd: vec3<f32>, height: f32) -> IntersectResult {
          var result: IntersectResult;
          result.hit = false;
          result.dist = 0.0;
          if (rd.y == 0.0) {
            return result;
          }
          let d = -(ro.y - height) / rd.y;
          let d_clamped = min(100000.0, d);
          if (d_clamped > 0.0) {
            result.hit = true;
            result.dist = d_clamped;
          }
          return result;
        }

        fn calculateHorizonFade(ro: vec3<f32>, rd: vec3<f32>, dist: f32) -> f32 {
          let horizonAngle = abs(rd.y);
          let angleFade = smoothstep(0.0, 0.4, horizonAngle);
          let distanceFade = 1.0 - smoothstep(HORIZONFADESTART, HORIZONFADEEND, dist);
          var fade = angleFade * distanceFade;
          if (horizonAngle < 0.2) {
            fade *= (1.0 - HORIZONBLURAMOUNT * (1.0 - horizonAngle / 0.2));
          }
          return fade;
        }

        struct SphereResult {
          hit: bool,
          dist: f32,
          normal: vec3<f32>,
        }

        fn intersectSphere(ro: vec3<f32>, rd: vec3<f32>, sph: vec4<f32>) -> SphereResult {
          var result: SphereResult;
          result.hit = false;
          result.dist = 0.0;
          result.normal = vec3<f32>(0.0);
          let ds = ro - sph.xyz;
          let bs = dot(rd, ds);
          let cs = dot(ds, ds) - sph.w * sph.w;
          let ts = bs * bs - cs;
          if (ts > 0.0) {
            let ts_val = -bs - sqrt(ts);
            if (ts_val > 0.0) {
              result.hit = true;
              result.dist = ts_val;
              result.normal = normalize(((ro + ts_val * rd) - sph.xyz) / sph.w);
            }
          }
          return result;
        }

        fn intersectBottle(ro: vec3<f32>, rd: vec3<f32>, time: f32) -> SphereResult {
          let pos = vec3<f32>(-3.0, 0.05 * cos(time * 0.6) + 0.05, 0.0);
          return intersectSphere(ro, rd, vec4<f32>(pos, 0.2));
        }

        fn cloudDensity(rd: vec3<f32>, time: f32) -> f32 {
          let planeResult = intersectPlane(vec3<f32>(0.0, 0.0, 0.0), rd, 500.0);
          let intersection = rd * planeResult.dist;
          let cloudCover = 0.05 * cos(time * 0.072 + 0.2) + 0.15;
          var cloud = 0.35 + 0.65 * fbm3(vec3<f32>((intersection.xz + WINDSPEED * time) * 0.001, time * 0.25)) - (0.8 - cloudCover);
          cloud += 0.02 * noise2(intersection.xz - WINDSPEED * time * 0.01);
          if (cloud < 0.0) {
            cloud = 0.0;
          }
          cloud = 1.0 - pow(CLOUDSHARPNESS, cloud);
          cloud = mix(cloudCover, cloud, smoothstep(0.0, 0.1, dot(rd, vec3<f32>(0.0, 1.0, 0.0))));
          return cloud;
        }

        fn getMoonDir(time: f32) -> vec3<f32> {
          return normalize(MOONPOSITION);
        }

        fn skyColorFunc(rd: vec3<f32>, time: f32, moondir: vec3<f32>, includeStars: bool) -> vec3<f32> {
          let moonglow = clamp(1.0782 * dot(moondir, rd), 0.0, 2.0);
          var col = SKYCOLOR * moondir.y;
          col += 0.4 * SKYBYMOONLIGHTCOLOR * moonglow;
          col += 0.43 * MOONLIGHTCOLOR * pow(moonglow, 21.0);
          let moonSphere = intersectSphere(vec3<f32>(0.0, 0.0, 0.0), rd, vec4<f32>(moondir, MOONSIZE));
          let moonhit = moonSphere.hit;
          let cloudDens = cloudDensity(rd, time);
          col *= (1.0 - cloudDens);
          if (moonhit) {
            let moonBrightness = 3.0 * MOONLIGHTCOLOR;
            let moonVisibility = 1.0 - cloudDens * 0.9;
            col += moonBrightness * max(moonVisibility, 0.1);
          }
          if (!moonhit && includeStars && rd.y > 0.0) {
            let noiseCoord = rd.xz;
            var s = noise2(noiseCoord * 134.0);
            s += noise2(noiseCoord * 370.0);
            s += noise2(noiseCoord * 870.0);
            s = pow(s, 19.0) * 0.00000001 * rd.y;
            if (s > 0.1) {
              let v = 1.0 / (2.0 * (1.0 + rd.z));
              let xy = vec2<f32>(rd.y * v, rd.x * v);
              let backStars = vec3<f32>((1.0 - sin(xy.x * 20.0 + time * 13.0 * rd.x + xy.y * 30.0)) * 0.5 * s, s, s);
              col += backStars;
            }
          }
          return col;
        }

        struct TraceResult {
          material: i32,
          intersection: vec3<f32>,
          normal: vec3<f32>,
          dist: f32,
          color: vec3<f32>,
        }

        fn traceBehindWater(ro: vec3<f32>, rd: vec3<f32>, time: f32, moondir: vec3<f32>) -> TraceResult {
          var result: TraceResult;
          result.material = 0;
          result.dist = 100000.0;
          result.intersection = vec3<f32>(0.0);
          result.normal = vec3<f32>(0.0, 1.0, 0.0);
          result.color = vec3<f32>(0.0);
          let bottleResult = intersectBottle(ro, rd, time);
          if (bottleResult.hit && bottleResult.dist < result.dist) {
            result.material = 3;
            result.normal = bottleResult.normal;
            result.dist = bottleResult.dist;
            result.intersection = ro + rd * result.dist;
          }
          let diff = clamp(dot(result.normal, moondir), 0.0, 1.0);
          if (result.material == 3) {
            result.color = BOTTLECOLOR * diff * smoothstep(0.0, 0.2, result.intersection.y);
          } else {
            // Only show sky when looking upward (from below water), otherwise show dark underwater color
            if (rd.y > 0.0) {
              result.color = skyColorFunc(rd, time, moondir, false);
            } else {
              // Dark underwater color when looking downward
              result.color = WATERCOLOR * 0.3;
            }
          }
          if (result.material > 0) {
            result.color = mix(result.color, SKYCOLOR * 0.15, clamp(result.dist / 100.0, 0.0, 1.0));
          }
          return result;
        }

        fn trace(ro: vec3<f32>, rd: vec3<f32>, currentDistance: f32, reflection: bool, time: f32, moondir: vec3<f32>) -> TraceResult {
          var result: TraceResult;
          result.material = 0;
          result.dist = 100000.0;
          result.intersection = vec3<f32>(0.0);
          result.normal = vec3<f32>(0.0, 1.0, 0.0);
          result.color = vec3<f32>(0.0);
          var d = 100000.0;
          if (!reflection) {
            let planeResult = intersectPlane(ro, rd, 0.0);
            if (planeResult.hit && planeResult.dist < d) {
              result.material = 2;
              result.normal = vec3<f32>(0.0, 1.0, 0.0);
              d = planeResult.dist;
            }
          }
          let bottleResult = intersectBottle(ro, rd, time);
          if (bottleResult.hit && bottleResult.dist < d) {
            result.material = 3;
            result.normal = bottleResult.normal;
            d = bottleResult.dist;
          }
          if (d < 100000.0) {
            result.dist = d;
            result.intersection = ro + rd * result.dist;
          }
          if (!reflection && result.material == 2) {
            let coord = result.intersection.xz;
            let bumpfactor = BUMPFACTOR * (1.0 - smoothstep(0.0, BUMPDISTANCE, result.dist));
            let eps2 = 2.0 * EPSILON;
            let hpx = waterHeightMap(coord + vec2<f32>(EPSILON, 0.0), time);
            let hmx = waterHeightMap(coord - vec2<f32>(EPSILON, 0.0), time);
            let hpz = waterHeightMap(coord + vec2<f32>(0.0, EPSILON), time);
            let hmz = waterHeightMap(coord - vec2<f32>(0.0, EPSILON), time);
            result.normal.x = bumpfactor * (hpx - hmx) / eps2;
            result.normal.z = bumpfactor * (hpz - hmz) / eps2;
            result.normal = normalize(result.normal);
          }
          let diff = clamp(dot(result.normal, moondir), 0.0, 1.0);
          if (result.material == 2) {
            let waterColor = WATERCOLOR * MOONLIGHTCOLOR * diff;
            let horizonFade = calculateHorizonFade(ro, rd, result.dist);
            // Only use traceBehindWater when camera is below water (looking up through water)
            // When camera is above water, only use water color and let reflection handle the sky
            if (ro.y < 0.0) {
              // Camera is below water - trace what's above/behind the water
              let behindWater = traceBehindWater(result.intersection + rd * EPSILON * 2.0, rd, time, moondir);
              var blendFactor = 0.5;
              if (behindWater.material == 3) {
                blendFactor = 0.4;
              }
              let blendedColor = mix(behindWater.color, waterColor, blendFactor);
              if (behindWater.material == 0) {
                result.color = blendedColor;
              } else {
                result.color = mix(skyColorFunc(rd, time, moondir, false), blendedColor, horizonFade);
              }
            } else {
              // Camera is above water - just use water color, reflection will add sky above
              result.color = waterColor;
            }
          } else if (result.material == 3) {
            result.color = BOTTLECOLOR * diff * smoothstep(0.0, 0.2, result.intersection.y);
          } else {
            result.color = skyColorFunc(rd, time, moondir, !reflection);
          }
          if (result.material > 0) {
            result.color = mix(result.color, SKYCOLOR * 0.15, clamp(result.dist / 100.0, 0.0, 1.0));
          }
          return result;
        }

        @fragment
        fn fs_main(input: VertexOutput) -> @location(0) vec4<f32> {
          let time = uniforms.time + 23.0;
          let q = input.uv;
          let aspect = uniforms.resolution.x / uniforms.resolution.y;
          var p = vec2<f32>((-1.0 + 2.0 * q.x) * aspect, -(-1.0 + 2.0 * q.y));
          let moondir = getMoonDir(time);
          let ro = uniforms.cameraPos;
          let ta = uniforms.cameraTarget;
          let cw = normalize(ta - ro);
          let cp = vec3<f32>(0.0, 1.0, 0.0);
          let cu = normalize(cross(cw, cp));
          let cv = normalize(cross(cu, cw));
          let rd = normalize(p.x * cu + p.y * cv + 1.5 * cw);
          var traceResult = trace(ro, rd, 0.0, false, time, moondir);
          if (traceResult.material == 2) {
            let rfld = reflect(rd, traceResult.normal);
            let reflectstrength = 1.0 - abs(dot(rd, traceResult.normal));
            let reflectResult = trace(traceResult.intersection + rfld * EPSILON, rfld, traceResult.dist, true, time, moondir);
            traceResult.color += 0.9 * reflectstrength * reflectResult.color;
          }
          var col = pow(traceResult.color, vec3<f32>(EXPOSURE));
          col = clamp(col, vec3<f32>(0.0), vec3<f32>(1.0));
          let vignette = q.x * q.y * (1.0 - q.x) * (1.0 - q.y);
          col *= 0.25 + 0.75 * pow(16.0 * vignette, 0.15);
          return vec4<f32>(col, 1.0);
        }
      `

      async function init() {
        const canvas = document.getElementById("gpuCanvas")
        if (!navigator.gpu) {
          alert("WebGPU not supported in this browser.")
          return
        }

        const adapter = await navigator.gpu.requestAdapter()
        const device = await adapter.requestDevice()
        const context = canvas.getContext("webgpu")
        const format = navigator.gpu.getPreferredCanvasFormat()

        context.configure({
          device,
          format,
          alphaMode: "premultiplied",
          usage: GPUTextureUsage.RENDER_ATTACHMENT,
        })

        const noiseTextureSize = config.noiseTextureSize
        let noiseTexture

        try {
          noiseTexture = device.createTexture({
            size: [noiseTextureSize, noiseTextureSize, 1],
            format: "r32float",
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.STORAGE_BINDING,
          })

          const computeModule = device.createShaderModule({ code: computeShaderCode })
          const computePipeline = device.createComputePipeline({
            layout: "auto",
            compute: { module: computeModule, entryPoint: "main" },
          })

          const computeBindGroup = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: noiseTexture.createView() }],
          })

          const encoder = device.createCommandEncoder()
          const computePass = encoder.beginComputePass()
          computePass.setPipeline(computePipeline)
          computePass.setBindGroup(0, computeBindGroup)
          computePass.dispatchWorkgroups(noiseTextureSize / 8, noiseTextureSize / 8, 1)
          computePass.end()
          device.queue.submit([encoder.finish()])
        } catch (e) {
          console.warn("Compute shader not available, using CPU fallback")
          noiseTexture = device.createTexture({
            size: [noiseTextureSize, noiseTextureSize, 1],
            format: "r32float",
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
          })

          const noiseData = new Float32Array(noiseTextureSize * noiseTextureSize)
          const hash2 = (p) => {
            const p3x = (p[0] * 0.1031) % 1
            const p3y = (p[1] * 0.103) % 1
            const p3z = (p[0] * 0.0973) % 1
            const dot = p3x * (p3y + 33.33) + p3y * (p3z + 33.33) + p3z * (p3x + 33.33)
            return ((p3x + p3y) * dot) % 1
          }
          for (let y = 0; y < noiseTextureSize; y++) {
            for (let x = 0; x < noiseTextureSize; x++) {
              const uv = [x / noiseTextureSize, y / noiseTextureSize]
              let noise = 0
              let amplitude = 1
              let p = [uv[0] * 8, uv[1] * 8]
              for (let i = 0; i < 4; i++) {
                noise += amplitude * hash2(p)
                amplitude *= 0.5
                p = [p[0] * 2, p[1] * 2]
              }
              noiseData[y * noiseTextureSize + x] = noise / 1.875
            }
          }

          device.queue.writeTexture(
            { texture: noiseTexture },
            noiseData,
            { bytesPerRow: noiseTextureSize * 4, rowsPerImage: noiseTextureSize },
            [noiseTextureSize, noiseTextureSize, 1]
          )
        }

        const module = device.createShaderModule({ code: shaderCode })
        const pipeline = device.createRenderPipeline({
          layout: "auto",
          vertex: { module, entryPoint: "vs_main" },
          fragment: { module, entryPoint: "fs_main", targets: [{ format }] },
          primitive: { topology: "triangle-list" },
        })

        const camera = new Camera(Math.PI, Math.PI * 0.4, 3.0, new Vec3(0.0, 0.2, 0.0))
        camera.attachControl(canvas)

        const uniformBuffer = device.createBuffer({
          size: 48,
          usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        })

        const bindGroup = device.createBindGroup({
          layout: pipeline.getBindGroupLayout(0),
          entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        })

        const startTime = performance.now()

        function frame() {
          const time = (performance.now() - startTime) / 1000
          const w = canvas.clientWidth * window.devicePixelRatio
          const h = canvas.clientHeight * window.devicePixelRatio
          if (canvas.width !== w || canvas.height !== h) {
            canvas.width = w
            canvas.height = h
          }

          const cameraPos = camera.getPosition()
          const cameraTarget = camera.target
          device.queue.writeBuffer(
            uniformBuffer,
            0,
            new Float32Array([
              time,
              0,
              w,
              h,
              cameraPos.x,
              cameraPos.y,
              cameraPos.z,
              0,
              cameraTarget.x,
              cameraTarget.y,
              cameraTarget.z,
              0,
            ])
          )

          const encoder = device.createCommandEncoder()
          const pass = encoder.beginRenderPass({
            colorAttachments: [
              {
                view: context.getCurrentTexture().createView(),
                clearValue: { r: 0, g: 0, b: 0, a: 1 },
                loadOp: "clear",
                storeOp: "store",
              },
            ],
          })
          pass.setPipeline(pipeline)
          pass.setBindGroup(0, bindGroup)
          pass.draw(6, 1, 0, 0)
          pass.end()
          device.queue.submit([encoder.finish()])
          requestAnimationFrame(frame)
        }

        requestAnimationFrame(frame)
      }

      init()
    </script>
  </body>
